collections:
  - name: 'pages'
    label: 'Páginas'
    folder: 'src/content/pages'
    create: true
    editor:
      preview: false
    slug: '{{slug}}'
    fields:
      - { label: 'Title', name: 'title', widget: 'string', required: false }
      - { label: 'Slug', name: 'slug', widget: 'string', required: true }
      - *pageSettings
      - *pageTheme
      - *mapBox
      - label: 'Components'
        name: 'components'
        widget: 'list'
        required: false
        collapsed: true
        types:
          - *group
          - *cta
          - *map
          - *spacer
